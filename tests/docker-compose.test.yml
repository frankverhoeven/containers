services:
    php-debian:
        build:
            context: ..
            dockerfile: php/8.5-fpm/Dockerfile
        entrypoint: sh
        command: /tests/php-test.sh
        volumes:
            - ./:/tests

    php-frankenphp:
        build:
            context: ..
            dockerfile: php/8.5-frankenphp/Dockerfile
        entrypoint: sh
        command: /tests/frankenphp-test.sh
        volumes:
            - ./:/tests
